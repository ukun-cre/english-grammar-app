function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function sLS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function lLS(k,d){try{const r=localStorage.getItem(k);return r?JSON.parse(r):d;}catch{return d;}}
function todayKey(){const d=new Date();return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;}
function parseExp(text){
  const r={},fi=text.indexOf("❌");
  r._correct=fi>=0?text.slice(0,fi).trim():text.trim();
  text.split("❌").slice(1).forEach(b=>{b=b.trim();const ai=b.indexOf("→");if(ai>=0)r[b.slice(0,ai).trim()]=b.slice(ai+1).trim();});
  return r;
}

/* ─── topicから答えのヒントを除去するヘルパー ─── */
function stripAnswerHint(topic){
  // 「過去進行形・肯定文（were）」→「過去進行形・肯定文」
  return topic.replace(/（[^）]*）/g,"").replace(/\([^)]*\)/g,"").trim();
}

/* ═══════════════ SPEECH ═══════════════ */
function speak(text,rate=0.85){
  if(!window.speechSynthesis||!text)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US";u.rate=rate;u.pitch=1.0;
  const voices=window.speechSynthesis.getVoices();
  const v=voices.find(v=>v.lang.startsWith("en-US"))||voices.find(v=>v.lang.startsWith("en"));
  if(v)u.voice=v;
  window.speechSynthesis.speak(u);
}

/* ═══════════════ SRS ═══════════════ */
function srsDefault(){return{ef:2.5,interval:1,reps:0,nextReview:Date.now()};}
function srsUpdate(rec,grade){
  let{ef,interval,reps}=rec;
  if(grade<3){reps=0;interval=1;}
  else{if(reps===0)interval=1;else if(reps===1)interval=6;else interval=Math.round(interval*ef);reps++;}
  ef=Math.max(1.3,ef+0.1-(5-grade)*(0.08+(5-grade)*0.02));
  return{ef,interval,reps,nextReview:Date.now()+interval*86400000};
}
function srsGrade(ok,ms){if(!ok)return 1;if(ms<3000)return 5;if(ms<6000)return 4;return 3;}
function srsSortPool(pool,srsData){
  const now=Date.now();
  return [...pool].sort((a,b)=>{
    const ra=srsData[a.id]||srsDefault();
    const rb=srsData[b.id]||srsDefault();
    const dueA=ra.nextReview<=now,dueB=rb.nextReview<=now;
    if(dueA&&!dueB)return -1;if(!dueA&&dueB)return 1;
    return ra.nextReview-rb.nextReview;
  });
}

/* ═══════════════ EXPORT / IMPORT ═══════════════ */
function exportData(){
  const data={};
  Object.values(SK).forEach(k=>{try{const v=localStorage.getItem(k);if(v)data[k]=JSON.parse(v);}catch{}});
  data._exportedAt=new Date().toISOString();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=`engram_backup_${todayKey()}.json`;a.click();URL.revokeObjectURL(url);
}
function importData(file,onDone){
  const reader=new FileReader();
  reader.onload=e=>{try{const data=JSON.parse(e.target.result);Object.values(SK).forEach(k=>{if(data[k]!==undefined)sLS(k,data[k]);});onDone(true);}catch{onDone(false);}};
  reader.readAsText(file);
}

    "比較級・最上級":{"比較級・er+than":"【比較級】形容詞に -er をつけ than を使います（tall → taller than）。","最上級・the+est":"【最上級】the ＋ 形容詞に -est をつけ in/of と使います（tall → the tallest in）。","不規則変化":"【不規則変化】good/well → better/best、bad → worse/worst のように特殊変化します。","不規則変化・最上級":"【不規則最上級】good/well → the best、many/much → the most のように変化します。"},
    "比較の応用":{"more/most比較":"【more/most比較】3音節以上の形容詞には more/the most を使います。","more/most・最上級":"【the most最上級】the most ＋ 形容詞 ＋ in/of で最上級を作ります。","as...as・同等比較":"【as...as構文】as ＋ 形容詞/副詞 ＋ as で「〜と同じくらい」を表します。","not as...as":"【not as...as】not as ＋ 形容詞 ＋ as で「〜ほど...ではない」を表します。","like better":"【like...better than】better ＋ than で「〜より〜の方が好き」を表します。","like best":"【like...the best】the best ＋ of で「〜の中で一番好き」を表します。"},
    "SVOO・感覚動詞":{"第4文型":"【第4文型SVOO】give/show/tell などは「動詞 ＋ 人 ＋ 物」の二重目的語を取ります。","to書き換え":"【to書き換え】give/show/send は「動詞 ＋ 物 ＋ to ＋ 人」に書き換えられます。","for書き換え":"【for書き換え】make/buy/cook は「動詞 ＋ 物 ＋ for ＋ 人」に書き換えられます。","感覚動詞+形容詞":"【感覚動詞＋形容詞】make/look/feel/sound などの後に形容詞を置きます（副詞ではありません）。"},
    "接続詞":{"when・時":"【when節】when ＋ 主語 ＋ 動詞 で「〜するとき」という時間の従属節を作ります。","because・理由":"【because節】because ＋ 主語 ＋ 動詞 で「〜なので」という理由を表します。","if・条件":"【if節】if ＋ 主語 ＋ 動詞（現在形）で「もし〜なら」。未来のことでも現在形を使います！","that・目的語":"【that節】think/know/say の後に that ＋ 主語 ＋ 動詞 を置き目的語にします。","before・after":"【before/after節】before（〜の前に）/ after（〜した後に）＋ 主語 ＋ 動詞 の形です。"},
    "代名詞":{"主格・目的格":"【人称代名詞】主格（I/he/she）は主語、目的格（me/him/her）は動詞や前置詞の後に使います。","所有格":"【所有格】my/his/her/their などは名詞の前に置き「〜の」を表します。","主格・所有格":"【人称代名詞の使い分け】文中の位置（主語/所有/目的）によって形が変わります。","所有代名詞":"【所有代名詞】mine/yours/his/hers/ours/theirs は「〜のもの」を表し、名詞の代わりに使います。","-thing系代名詞":"【-thing系代名詞】something（何か）/ nothing（何も〜ない）/ anything（何かを/何も）を使い分けます。"},
    "まとめ":{"be動詞・一般動詞復習":"【動詞の使い分け】be動詞（状態・存在）と一般動詞（動作）を正しく使い分けましょう。","命令文復習":"【命令文の復習】Be動詞命令文と一般動詞命令文、否定命令文（Don't）を確認しましょう。","過去形・進行形復習":"【過去の表現】過去形（完了した動作）と過去進行形（継続中だった動作）の違いを意識しましょう。","未来形復習":"【未来形の復習】will（その場の判断）と be going to（計画・意図）の使い分けを確認しましょう。","総合復習":"【総合復習】これまでの文法を確認しましょう。語順・時制・助動詞に注意！"},
  };
  const genre=q.genre||"",topic=q.topic||"";
  let rule="";
  if(ruleMap[genre]&&ruleMap[genre][topic])rule=ruleMap[genre][topic];
  else if(ruleMap[genre])rule=Object.values(ruleMap[genre])[0]||"";
  const answer2=answer;
  const breakdown=answer2.map((w,i)=>{
    let role="";
    if(i===0){if(["I","You","He","She","We","They","It"].includes(w))role="主語（S）";else if(["not","no"].includes(w.toLowerCase()))role="否定語";else role="文頭の語";}
    else if(["not","no"].includes(w.toLowerCase()))role="否定語";
    else if(["to","at","in","on","for","of","from","with","by","about","before","after","while","when","because","if","that"].includes(w.toLowerCase()))role="接続詞/前置詞";
    else if(["a","an","the","my","your","his","her","our","their","its","this","that","some","any"].includes(w.toLowerCase()))role="冠詞/限定詞";
    else if(i===1&&!role)role="動詞（V）";
    return role?`「${w}」→${role}`:`「${w}」`;
  }).join("　");
  return{rule,breakdown,answerStr:answer2.join(" "),japanese:q.japanese};
}

/* ═══════════════ ROOT APP ═══════════════ */
function App({fillBank,sortBank,wordBank}){
  const [sc,setSc]=useState("main");
  const [hist,setHist]=useState(()=>lLS(SK.history,[]));
  const [fmist,setFmist]=useState(()=>lLS(SK.mistakes,{}));
  const [wprog,setWprog]=useState(()=>lLS(SK.wordProg,{}));
  const [srsData,setSrsData]=useState(()=>lLS(SK.srs,{}));
  const [streakData,setStreakData]=useState(()=>lLS(SK.streak,{count:0,lastDay:""}));
  const [xp,setXp]=useState(()=>lLS(SK.xp,0));
  const [xpFloats,setXpFloats]=useState([]);
  const [lvUpShow,setLvUpShow]=useState(false);

  const touchStreak=useCallback(()=>{
    const today=todayKey();
    setStreakData(prev=>{
      const d=new Date();d.setDate(d.getDate()-1);
      const yesterday=`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
      let count=prev.count||0;
      if(prev.lastDay===today)return prev;
      if(prev.lastDay===yesterday)count++;
      else count=1;
      const next={count,lastDay:today};sLS(SK.streak,next);return next;
    });
  },[]);

  const addXP=useCallback((amount,evt)=>{
    setXp(prev=>{
      const next=prev+amount;
      if(getLevel(next)>getLevel(prev)){setLvUpShow(true);setTimeout(()=>setLvUpShow(false),3200);}
      sLS(SK.xp,next);return next;
    });
    if(evt){const id=Date.now()+"_"+Math.random();setXpFloats(p=>[...p,{id,x:evt.clientX-30,y:evt.clientY-20,amount}]);}
  },[]);

  const removeFloat=useCallback(id=>setXpFloats(p=>p.filter(f=>f.id!==id)),[]);
  const addHist=useCallback(e=>{touchStreak();setHist(p=>{const n=[{...e,ts:Date.now()},...p].slice(0,300);sLS(SK.history,n);return n;});},[touchStreak]);
  const saveMist=useCallback(l=>{setFmist(l);sLS(SK.mistakes,l);},[]);
  const saveWP=useCallback(p=>{setWprog(p);sLS(SK.wordProg,p);},[]);
  const saveSRS=useCallback(p=>{setSrsData(p);sLS(SK.srs,p);},[]);

  const handleImport=useCallback(file=>{
    importData(file,ok=>{
      if(ok){
        setHist(lLS(SK.history,[]));setFmist(lLS(SK.mistakes,{}));
        setWprog(lLS(SK.wordProg,{}));setSrsData(lLS(SK.srs,{}));
        setStreakData(lLS(SK.streak,{count:0,lastDay:""}));setXp(lLS(SK.xp,0));
        alert("✅ データを復元しました！");
      }else alert("❌ 読み込みに失敗しました。");
    });
  },[]);

  const handleResetHist=useCallback(()=>{
    setHist([]);sLS(SK.history,[]);
    alert("✅ 学習履歴をリセットしました。XP・レベル・間違いリストは保持されています。");
  },[]);

  return(
    <>
      <style>{G}</style>
      {xpFloats.map(f=><XPFloat key={f.id} x={f.x} y={f.y} amount={f.amount} onDone={()=>removeFloat(f.id)}/>)}
      {lvUpShow&&(
        <div style={{position:"fixed",inset:0,zIndex:9998,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,.55)",pointerEvents:"none"}}>
          <div className="lvUpAnim" style={{background:"linear-gradient(135deg,#FFD600,#FF6B35)",borderRadius:24,padding:"28px 40px",textAlign:"center",boxShadow:"0 20px 60px rgba(255,107,53,.5)"}}>
            <div style={{fontSize:60}}>🏆</div>
            <div style={{color:"#fff",fontWeight:900,fontSize:26,fontFamily:"'Nunito',sans-serif",margin:"8px 0"}}>レベルアップ！</div>
            <div style={{color:"rgba(255,255,255,.85)",fontWeight:700,fontSize:14}}>Lv.{getLevel(xp)} になりました！</div>
          </div>
        </div>
      )}
      {sc==="fill"    &&<FillQuiz bank={fillBank} mist={fmist} setMist={saveMist} addHist={addHist} addXP={addXP} back={()=>setSc("main")}/>}
      {sc==="sort"    &&<SortQuiz bank={sortBank} addHist={addHist} addXP={addXP} back={()=>setSc("main")}/>}
      {sc==="word"    &&<WordQuiz bank={wordBank} wp={wprog} saveWP={saveWP} srsData={srsData} saveSRS={saveSRS} addHist={addHist} addXP={addXP} back={()=>setSc("main")}/>}
      {sc==="history" &&<HistScreen hist={hist} fillBank={fillBank} fmist={fmist} xp={xp} streak={streakData} onExport={exportData} onImport={handleImport} onResetHist={handleResetHist} back={()=>setSc("main")}/>}
      {sc==="main"    &&<MainMenu onSel={setSc} hist={hist} fmist={fmist} xp={xp} streak={streakData}/>}
    </>
  );
}

/* ═══════════════ MAIN MENU ═══════════════ */
function MainMenu({onSel,hist,fmist,xp,streak}){
  const rc=Object.entries(fmist).filter(([,ts])=>Date.now()-ts>=REVIEW_MS).length;

          <div style={{display:"flex",gap:6,width:"max-content",paddingBottom:3}}>
            {Object.entries(UM).map(([key,meta])=>{const a=au===key,h=guc(key)>0;return(
              <button key={key} onClick={()=>{if(h)setAu(key);}} style={{background:a?"#fff":h?"rgba(255,255,255,.18)":"rgba(255,255,255,.07)",border:a?`3px solid ${meta.color}`:`2px solid ${h?"rgba(255,255,255,.35)":"rgba(255,255,255,.15)"}`,borderRadius:13,padding:"8px 10px",cursor:h?"pointer":"default",textAlign:"center",fontFamily:F,minWidth:80,flexShrink:0,opacity:h?1:0.45}}>
                <div style={{fontSize:15,marginBottom:1}}>{meta.emoji}</div>
                <div style={{fontWeight:900,fontSize:10,color:a?meta.color:"#fff",whiteSpace:"nowrap"}}>{meta.label}</div>
                <div style={{fontSize:8,color:a?"#374151":"#D1D5DB",fontWeight:700,lineHeight:1.3,marginBottom:2,maxWidth:74,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{meta.title}</div>
                <div style={{background:a?meta.color:h?"rgba(255,255,255,.35)":"rgba(255,255,255,.15)",color:"#fff",fontSize:8,fontWeight:900,borderRadius:99,padding:"2px 6px",display:"inline-block"}}>{h?`${guc(key)}問`:"準備中"}</div>
              </button>
            );})}
          </div>
        </div>
        <div style={{background:"rgba(255,255,255,.97)",borderRadius:18,padding:"14px 13px",boxShadow:"0 8px 32px rgba(0,0,0,.16)"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,paddingBottom:11,marginBottom:11,borderBottom:"2px solid #F3F4F6"}}>
            <div style={{width:36,height:36,borderRadius:10,background:um.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{um.emoji}</div>
            <div><p style={{color:um.color,fontWeight:900,fontSize:13,margin:0}}>{um.label}：{um.title}</p><p style={{color:"#6B7280",fontSize:10,fontWeight:700,margin:"1px 0 0"}}>レベルを選んで練習しよう</p></div>
          </div>
          {um.genres.map(genre=>{const gm=GM[genre];return(
            <div key={genre} style={{marginBottom:12}}>
              {um.genres.length>1&&<div style={{display:"flex",alignItems:"center",gap:5,marginBottom:6}}><span style={{fontSize:13}}>{gm.emoji}</span><span style={{fontWeight:900,fontSize:11,color:gm.color}}>{genre}</span><div style={{flex:1,height:2,background:gm.color,opacity:.18,borderRadius:99}}/></div>}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                {["Lv1","Lv2","Lv3"].map(level=>{const lm=LM[level],cnt=gc(genre,level),locked=cnt===0;return(
                  <button key={level} disabled={locked} onClick={()=>start(genre,level)}
                    style={{background:locked?"#F9FAFB":lm.bg,border:`2.5px solid ${locked?"#E5E7EB":lm.color}`,borderRadius:12,padding:"8px 4px",cursor:locked?"not-allowed":"pointer",textAlign:"center",opacity:locked?0.45:1,fontFamily:F}}>
                    <div style={{fontFamily:"'Nunito',sans-serif",fontWeight:900,fontSize:14,color:locked?"#9CA3AF":lm.color}}>{lm.label}</div>
                    <div style={{fontSize:8,color:locked?"#9CA3AF":"#374151",fontWeight:700,margin:"2px 0 3px",lineHeight:1.3}}>{um.levelDesc[level]}</div>
                    <div style={{background:locked?"#E5E7EB":lm.color,color:"#fff",fontWeight:900,fontSize:9,borderRadius:99,padding:"2px 6px",display:"inline-block"}}>{locked?"準備中":`${cnt}問`}</div>
                  </button>
                );})}
              </div>
            </div>
          );})}
          <button onClick={()=>start(um.genres.length===1?um.genres[0]:null,null)}
            style={{width:"100%",background:`linear-gradient(90deg,${um.color},${um.color}bb)`,color:"#fff",fontWeight:900,fontSize:12,padding:"11px 0",borderRadius:12,border:"none",cursor:"pointer",fontFamily:F,marginTop:2,boxShadow:`0 4px 14px ${um.color}44`}}>
            {um.emoji} {um.label}の全{guc(au)}問に挑戦！
          </button>
        </div>
        <button onClick={()=>start(null,null)} style={{width:"100%",marginTop:8,background:"rgba(255,255,255,.14)",color:"#fff",fontWeight:900,fontSize:12,padding:"10px 0",borderRadius:12,border:"2px solid rgba(255,255,255,.35)",cursor:"pointer",fontFamily:F}}>
          🚀 全{bank.length}問まとめて挑戦！
        </button>
      </div>
    </div>
  );

  if(sub==="complete"){
    const pct=score.t?Math.round(score.c/score.t*100):0,col=pct>=60?"#059669":"#DC2626";
    const perfect=pct===100;
    return(
      <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#6366F1,#8B5CF6,#EC4899)",fontFamily:F,padding:"20px 16px 40px",overflowY:"auto"}}>
        <Fireworks show={perfect}/>
        <div className="pop" style={{maxWidth:440,margin:"0 auto",textAlign:"center"}}>
          <div style={{fontSize:66}}>{perfect?"🏆":pct>=60?"💪":"📖"}</div>
          <h2 style={{fontFamily:"'Nunito',sans-serif",fontWeight:900,fontSize:30,color:"#fff",margin:"0 0 3px"}}>{perfect?"パーフェクト！":"おわり！"}</h2>
          <div style={{background:"#fff",borderRadius:18,padding:"20px",marginBottom:12,boxShadow:"0 8px 30px rgba(0,0,0,.15)"}}>
            <div style={{fontSize:54,fontWeight:900,color:col,fontFamily:"'Nunito',sans-serif",lineHeight:1}}>{pct}<span style={{fontSize:26}}>%</span></div>
            <p style={{color:"#374151",fontWeight:700,fontSize:14,margin:"4px 0 12px"}}>{score.c} / {score.t} 問正解</p>
            <div style={{height:12,background:"#E5E7EB",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:col,borderRadius:99,transition:"width 1s"}}/></div>
            <div style={{marginTop:10,background:"#FFFDE7",borderRadius:10,padding:"9px",display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:20}}>⭐</span>
              <span style={{color:"#374151",fontWeight:700,fontSize:12}}>獲得XP: <strong style={{color:"#F59E0B"}}>+{score.c*XP_PER_CORRECT}</strong></span>
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>start(sg,sl)} style={{flex:1,background:"#FFD600",color:"#1A1A2E",fontWeight:900,fontSize:13,padding:"13px 0",borderRadius:14,border:"none",cursor:"pointer",fontFamily:F}}>🔄 もう一度</button>
            <button onClick={()=>setSub("home")} style={{flex:1,background:"rgba(255,255,255,.2)",color:"#fff",fontWeight:900,fontSize:13,padding:"13px 0",borderRadius:14,border:"2px solid rgba(255,255,255,.4)",cursor:"pointer",fontFamily:F}}>📚 単元選択</button>
          </div>
          <button onClick={back} style={{width:"100%",marginTop:8,background:"rgba(255,255,255,.1)",color:"rgba(255,255,255,.6)",fontWeight:900,fontSize:12,padding:"10px 0",borderRadius:12,border:"1px solid rgba(255,255,255,.18)",cursor:"pointer",fontFamily:F}}>🏠 メニューへ</button>
        </div>
      </div>
    );
  }

  if(!q)return null;
  const gm=GM[q.genre]||{},lm=LM[q.level]||{},prog=queue.length?(idx/queue.length)*100:0;
  const correctText=q.options.find(o=>o.correct)?.text||"";
  // ★ Fix: 正解全文を構築。あらゆる穴埋め形式に対応
  // 全角・半角アンダースコア、括弧形式、スペースのある___すべてに対応
  function buildFullSentence(template, answer) {
    if(!template||!answer) return answer||"";
    const result = template
      .replace(/[＿_]{2,}/g, answer)      // 半角・全角アンダースコア2個以上
      .replace(/\(\s*\)/g, answer)         // 空の ( )
      .replace(/（\s*）/g, answer)         // 空の （ ）
      .replace(/\([^)]*\)/g, answer)       // ( 何か )
      .replace(/（[^）]*）/g, answer);     // （ 何か ）
    // 置換が起きなかった場合（テンプレートに穴がない）：answerをそのまま返す
    return result === template ? answer : result;
  }
  const fullSentence = buildFullSentence(q.english, correctText);

  const doSel=opt=>{setSel(opt);setPhase("confirm");};
  const doConf=()=>{
    const ok=sel.correct;
    const ns={c:score.c+(ok?1:0),t:score.t+1};setScore(ns);
    const newCombo=ok?combo+1:0;setCombo(newCombo);
    setResult(ok?"correct":"wrong");
    if(ok){addXP(XP_PER_CORRECT+(newCombo>=3?XP_BONUS_STREAK:0),null);}
    if(!ok){setShaking(true);setTimeout(()=>setShaking(false),600);setMist({...mist,[q.id]:Date.now()});}
    else if(mist[q.id]){const l={...mist};delete l[q.id];setMist(l);}
    addHist({mode:"fill",label:sg||"全問",correct:ok?1:0,total:1});
    setPhase("result");
  };
  const doNext=()=>{
    setShowAll(false);setResult(null);setShowPron(false);
    if(idx+1>=queue.length){
      if(score.c===score.t&&score.t>0)setShowFireworks(true);
      setSub("complete");
    } else{setIdx(i=>i+1);setSel(null);setPhase("question");}
  };

  return(
    <div style={{minHeight:"100vh",background:"#F0F4FF",fontFamily:F,paddingBottom:40}}>
      <div style={{background:"linear-gradient(90deg,#6366F1,#8B5CF6)",padding:"10px 14px 0"}}>
        <div style={{maxWidth:500,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
              <button onClick={handleBack} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",fontWeight:900,fontSize:10,padding:"4px 8px",borderRadius:99,cursor:"pointer",fontFamily:F}}>← 単元選択</button>
              <button onClick={handleBackToMenu} style={{background:"rgba(255,255,255,.12)",border:"1px solid rgba(255,255,255,.3)",color:"rgba(255,255,255,.8)",fontWeight:900,fontSize:10,padding:"4px 8px",borderRadius:99,cursor:"pointer",fontFamily:F}}>🏠</button>
              {sg&&<span style={{background:gm.bg,color:gm.color,fontWeight:900,fontSize:9,padding:"2px 7px",borderRadius:99}}>{sg}</span>}
              {sl&&<span style={{background:lm.bg,color:lm.color,fontWeight:900,fontSize:9,padding:"2px 7px",borderRadius:99}}>{lm.label}</span>}
              {rm&&<span style={{background:"#FFF3CD",color:"#92400E",fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:99}}>🔁 復習</span>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              {combo>=3&&<span className="comboAnim" style={{background:combo>=6?"linear-gradient(90deg,#FF6B35,#FFD600)":"#FF6B35",color:"#fff",fontWeight:900,fontSize:9,padding:"2px 8px",borderRadius:99}}>{combo>=6?"⚡":"🔥"}{combo}連続！</span>}
              <span style={{color:"#C7D2FE",fontWeight:900,fontSize:12,fontFamily:"'Nunito',sans-serif",whiteSpace:"nowrap"}}><span style={{color:"#fff"}}>{idx+1}</span>/{queue.length}</span>
            </div>
          </div>
          <div style={{height:8,background:"rgba(255,255,255,.25)",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${prog}%`,background:"#FFD600",borderRadius:99,transition:"width .5s"}}/></div>
        </div>
      </div>

      <div style={{maxWidth:500,margin:"0 auto",padding:"12px 13px 0"}}>
        {combo>=3&&phase==="question"&&<ComboDisplay combo={combo}/>}

        <div key={q.id} className={shaking?"shake":"pop"} style={{background:CB[idx%CB.length],border:`3px solid ${gm.color||"#6366F1"}`,borderRadius:18,padding:"16px 18px",marginBottom:12}}>
          <div style={{display:"flex",gap:6,marginBottom:9,alignItems:"center"}}>
            {/* ★ Fix: topicバッジから（答え）を除去して表示 */}
            <span style={{background:gm.color||"#6366F1",color:"#fff",fontSize:9,fontWeight:900,padding:"3px 9px",borderRadius:99}}>{stripAnswerHint(q.topic)}</span>
            <span style={{background:lm.bg||"#DBEAFE",color:lm.color||"#2563EB",fontSize:9,fontWeight:900,padding:"3px 7px",borderRadius:99}}>{lm.label}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:11}}>
            <span style={{fontSize:38,flexShrink:0}}>{q.emoji}</span>
            <div style={{flex:1}}>
              <p style={{color:"#374151",fontWeight:700,fontSize:13,margin:"0 0 6px",lineHeight:1.5}}>{q.sentence}</p>
              <p style={{color:gm.color||"#4F46E5",fontWeight:900,fontSize:20,margin:0,fontFamily:"'Nunito',sans-serif"}}>{q.english}</p>
            </div>
          </div>
          <p style={{color:"#6B7280",fontSize:10,fontWeight:700,margin:"10px 0 0",textAlign:"center"}}>▼ ___ に入る正しい英語を選ぼう！</p>
        </div>

        {phase==="question"&&(
          <div style={{display:"flex",flexDirection:"column",gap:9}}>
            {q.options.map((opt,i)=>(
              <button key={opt.id} className="fadeUp" style={{animationDelay:`${i*50}ms`,display:"flex",alignItems:"center",gap:12,background:"#fff",border:`3px solid ${OC[i]}`,borderRadius:15,padding:"12px 15px",cursor:"pointer",fontFamily:F,width:"100%"}} onClick={()=>doSel(opt)}>
                <span style={{background:OC[i],color:"#fff",fontWeight:900,fontSize:12,width:30,height:30,borderRadius:99,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontFamily:"'Nunito',sans-serif"}}>{OL[i]}</span>
                <span style={{color:"#111827",fontWeight:900,fontSize:17,fontFamily:"'Nunito',sans-serif"}}>{opt.text}</span>
              </button>
            ))}
          </div>
        )}

        {phase==="confirm"&&(
          <div className="fadeUp" style={{display:"flex",flexDirection:"column",gap:10}}>
            <div style={{background:"#EDE9FE",border:"3px solid #7C3AED",borderRadius:18,padding:"16px",textAlign:"center"}}>
              <div style={{fontSize:40,marginBottom:6}}>🗣️</div>
              <p style={{color:"#1F2937",fontWeight:900,fontSize:14,margin:"0 0 3px"}}>選んだ答え：<span style={{color:"#7C3AED",fontFamily:"'Nunito',sans-serif",fontSize:16}}>{sel.text}</span></p>
              <div style={{height:2,background:"#C4B5FD",margin:"10px 0"}}/>
              <p style={{color:"#4C1D95",fontWeight:900,fontSize:12,margin:"0 0 4px"}}>なぜその答えを選びましたか？</p>
              <p style={{color:"#5B21B6",fontWeight:700,fontSize:11,lineHeight:1.8,margin:0}}>声に出して理由を説明してから<br/><span style={{color:"#7C3AED",fontWeight:900}}>ボタンを押してください！</span></p>
            </div>
            <button onClick={doConf} style={{background:"#7C3AED",color:"#fff",fontWeight:900,fontSize:14,padding:"14px 0",borderRadius:15,border:"none",cursor:"pointer",fontFamily:F,boxShadow:"0 5px 18px rgba(124,58,237,.4)"}}>✅ 説明できた！→ 答えを見る</button>
            <button onClick={()=>{setSel(null);setPhase("question");}} style={{background:"#fff",color:"#6B7280",fontWeight:700,fontSize:12,padding:"10px 0",borderRadius:12,border:"2.5px solid #D1D5DB",cursor:"pointer",fontFamily:F}}>← 選択肢に戻る</button>
          </div>
        )}

        {phase==="result"&&(
          <div className="fadeUp" style={{display:"flex",flexDirection:"column",gap:10}}>
            <div style={{background:result==="correct"?"#D1FAE5":"#FEE2E2",border:`3px solid ${result==="correct"?"#059669":"#DC2626"}`,borderRadius:18,padding:"14px",textAlign:"center"}}>
              <div style={{fontSize:50}}>{result==="correct"?"🎉":"😅"}</div>
              <p style={{color:result==="correct"?"#065F46":"#991B1B",fontWeight:900,fontSize:19,margin:"4px 0 0",fontFamily:"'Nunito',sans-serif"}}>{result==="correct"?PRAISE[praiseIdx]:RETRY[retryIdx]}</p>
              {result==="correct"&&<div style={{color:"#065F46",fontWeight:700,fontSize:11,marginTop:4}}>+{XP_PER_CORRECT+(combo>=3?XP_BONUS_STREAK:0)} XP{combo>=3?" ⚡コンボボーナス":""}</div>}
            </div>

            <div style={{background:"#fff",border:"2.5px solid #E5E7EB",borderRadius:16,padding:"13px 15px"}}>
              <p style={{color:"#111827",fontWeight:700,fontSize:11,lineHeight:1.8,margin:"0 0 10px"}}>{q.explanation.correct}</p>

              <div style={{background:"#F0F9FF",border:"2px solid #BAE6FD",borderRadius:12,padding:"10px 12px",marginBottom:10}}>
                <p style={{color:"#0369A1",fontWeight:900,fontSize:10,margin:"0 0 6px"}}>✅ 正解の全文を声に出して練習しよう！</p>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                  <span style={{color:"#0369A1",fontWeight:900,fontSize:15,fontFamily:"'Nunito',sans-serif",flex:1,lineHeight:1.4}}>{fullSentence}</span>
                </div>
                {/* ★ Fix: fullSentenceには正解が埋め込まれているので、正しく全文が読まれる */}
                <SpeakButton text={fullSentence} label="🔊 正解の全文を聴く" color="#0369A1" size="large"/>
              </div>

              {result==="wrong"&&<div style={{background:"#D1FAE5",border:"2.5px solid #059669",borderRadius:11,padding:"9px 11px",marginBottom:8}}><p style={{color:"#065F46",fontWeight:900,fontSize:12,margin:0}}>✅ 正解：<span style={{fontSize:16,fontFamily:"'Nunito',sans-serif",marginLeft:3}}>{correctText}</span></p></div>}
              {q.genre==="代名詞"&&<button onClick={()=>setShowPron(v=>!v)} style={{background:"#EDE9FE",color:"#6D28D9",fontWeight:900,fontSize:10,padding:"7px 0",borderRadius:8,border:"2px solid #C4B5FD",cursor:"pointer",width:"100%",fontFamily:F,marginBottom:6}}>{showPron?"▲ 代名詞変化表を閉じる":"👤 代名詞変化表を見る"}</button>}
              {showPron&&<div style={{marginBottom:7,overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:9}}><thead><tr style={{background:"#6D28D9",color:"#fff"}}>{["","主格","所有格","目的格","所有代名詞"].map((h,i)=><th key={i} style={{padding:"3px 4px",fontWeight:900,fontSize:8}}>{h}</th>)}</tr></thead><tbody>{PT.map((r,i)=><tr key={i} style={{background:i%2===0?"#EDE9FE":"#F5F3FF"}}><td style={{padding:"3px 4px",fontWeight:900,color:"#5B21B6",fontSize:9}}>{r.label}</td>{[r.subj,r.poss,r.obj,r.pp].map((v,j)=><td key={j} style={{padding:"3px 4px",textAlign:"center",fontFamily:"'Nunito',sans-serif",fontWeight:700,fontSize:10}}>{v}</td>)}</tr>)}</tbody></table></div>}
              <button onClick={()=>setShowAll(v=>!v)} style={{background:"#F3F4F6",color:"#374151",fontWeight:700,fontSize:10,padding:"7px 0",borderRadius:8,border:"2px solid #E5E7EB",cursor:"pointer",width:"100%",fontFamily:F}}>{showAll?"▲ 全選択肢の解説を閉じる":"▼ 全選択肢の解説を見る"}</button>
              {showAll&&<div style={{marginTop:8,display:"flex",flexDirection:"column",gap:6}}>{q.options.map((opt,i)=>{const p=parseExp(q.explanation.correct);return(<div key={opt.id} style={{background:opt.correct?"#D1FAE5":"#FEF2F2",border:`2px solid ${opt.correct?"#6EE7B7":"#FECACA"}`,borderRadius:10,padding:"8px 10px"}}><div style={{display:"flex",gap:6,alignItems:"center",marginBottom:2}}><span style={{background:OC[i],color:"#fff",fontWeight:900,fontSize:9,width:18,height:18,borderRadius:99,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{OL[i]}</span><span style={{fontWeight:900,fontSize:12,fontFamily:"'Nunito',sans-serif"}}>{opt.text}</span>{opt.correct&&<span style={{background:"#059669",color:"#fff",fontSize:8,fontWeight:900,padding:"1px 5px",borderRadius:99}}>正解</span>}</div><p style={{color:opt.correct?"#065F46":"#991B1B",fontSize:10,fontWeight:700,margin:"0 0 0 24px",lineHeight:1.6}}>{opt.correct?p._correct:(p[opt.text]||"正解の解説を確認しよう！")}</p></div>);})}</div>}
              <AiChatButton question={q.sentence} answer={fullSentence} />
            </div>
            <button onClick={doNext} style={{background:"#FFD600",color:"#1A1A2E",fontWeight:900,fontSize:15,padding:"14px 0",borderRadius:16,border:"none",cursor:"pointer",fontFamily:F,boxShadow:"0 5px 18px rgba(255,214,0,.45)"}}>{idx+1>=queue.length?"🏁 結果を見る！":"次の問題へ →"}</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════ SORT QUIZ ═══════════════ */
function SortQuiz({bank,addHist,addXP,back}){
  const [sub,setSub]=useState("home");
  const [au,setAu]=useState(Object.keys(UM).find(k=>bank.some(q=>q.unit===k))||"単元1");
  const [queue,setQueue]=useState([]);
  const [idx,setIdx]=useState(0);
  const [phase,setPhase]=useState("question");
  const [arr,setArr]=useState([]);
  const [avail,setAvail]=useState([]);
  const [result,setResult]=useState(null);
  const [score,setScore]=useState({c:0,t:0});
  const [shaking,setShaking]=useState(false);
  const [su,setSu]=useState(null);
  const [sl,setSl]=useState(null);
  const [showExpl,setShowExpl]=useState(false);
  const [combo,setCombo]=useState(0);

  const gc=(u,l)=>bank.filter(q=>q.unit===u&&(l?q.level===l:true)).length;
  const initQ=q=>{const all=shuf([...q.answer.filter(w=>w!==","),...q.extra]);setAvail(all.map((w,i)=>({w,id:`av${i}_${Date.now()}`})));setArr([]);};

  const handleBack = useCallback(() => { setSub("home"); },[]);
  const handleBackToMenu = useCallback(() => { back(); },[back]);

  const start=useCallback((unit,level)=>{
    let pool=[...bank];if(unit)pool=pool.filter(q=>q.unit===unit);if(level)pool=pool.filter(q=>q.level===level);
    pool=shuf(pool);if(pool.length===0)return;setQueue(pool);setSu(unit);setSl(level);
    setIdx(0);setScore({c:0,t:0});setPhase("question");setResult(null);initQ(pool[0]);setSub("quiz");setShowExpl(false);setCombo(0);
  },[bank]);
  useEffect(()=>{if(queue[idx]){initQ(queue[idx]);setShowExpl(false);}}, [idx]);

  const q=queue[idx];
  const tapAv=item=>{setAvail(p=>p.filter(x=>x.id!==item.id));setArr(p=>[...p,item]);};
  const tapArr=item=>{setArr(p=>p.filter(x=>x.id!==item.id));setAvail(p=>[...p,item]);};
  const check=()=>{
    const correct=q.answer.filter(w=>w!==","),ans=arr.map(x=>x.w);
    const ok=ans.length===correct.length&&ans.every((w,i)=>w===correct[i]);
    setResult(ok?"correct":"wrong");
    if(!ok){setShaking(true);setTimeout(()=>setShaking(false),600);}
    const newCombo=ok?combo+1:0;setCombo(newCombo);
    if(ok)addXP(XP_PER_CORRECT+(newCombo>=3?XP_BONUS_STREAK:0),null);
    setScore(s=>{
      const ns={c:s.c+(ok?1:0),t:s.t+1};
      addHist({mode:"sort",label:su||"全問",correct:ok?1:0,total:1});
      return ns;
    });
    setPhase("result");
  };
  const next=()=>{
    setResult(null);setShowExpl(false);
    if(idx+1>=queue.length){setSub("complete");}
    else{setIdx(i=>i+1);setPhase("question");}
  };
  const um=UM[au]||{};
  const expl=q?genSortExpl(q):null;

  if(sub==="home") return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#064E3B,#059669,#10B981)",fontFamily:F,padding:"16px 16px 32px",overflowY:"auto"}}>
      <div style={{maxWidth:480,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <button onClick={back} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",fontWeight:900,fontSize:12,padding:"6px 12px",borderRadius:99,cursor:"pointer",fontFamily:F}}>← メニュー</button>
          <h2 style={{color:"#fff",fontWeight:900,fontSize:16,margin:0}}>🔀 並べ替え問題</h2>
        </div>
        <div style={{background:"rgba(255,255,255,.12)",borderRadius:11,padding:"8px 12px",marginBottom:12}}>
          <p style={{color:"#fff",fontWeight:700,fontSize:11,margin:0,lineHeight:1.7}}>💡 日本語を見て英単語をタップして正しい順番に並べよう！<br/>📖 正解後に文法解説＆音声ボタンが表示されます。</p>
        </div>
        <div style={{overflowX:"auto",marginBottom:10,WebkitOverflowScrolling:"touch"}}>
          <div style={{display:"flex",gap:6,width:"max-content",paddingBottom:3}}>
            {Object.entries(UM).map(([key,meta])=>{const a=au===key,h=bank.some(q=>q.unit===key);return(
              <button key={key} onClick={()=>{if(h)setAu(key);}} style={{background:a?"#fff":h?"rgba(255,255,255,.2)":"rgba(255,255,255,.06)",border:a?"3px solid #059669":"2px solid rgba(255,255,255,.22)",borderRadius:12,padding:"7px 10px",cursor:h?"pointer":"default",textAlign:"center",fontFamily:F,minWidth:76,flexShrink:0,opacity:h?1:0.4}}>
                <div style={{fontSize:13}}>{meta.emoji}</div>
                <div style={{fontWeight:900,fontSize:9,color:a?"#059669":"#fff",whiteSpace:"nowrap"}}>{meta.label}</div>
                <div style={{background:a?"#059669":"rgba(255,255,255,.22)",color:"#fff",fontSize:8,fontWeight:900,borderRadius:99,padding:"2px 6px",display:"inline-block",marginTop:2}}>{h?`${gc(key)}問`:"準備中"}</div>
              </button>
            );})}
          </div>
        </div>
        {bank.some(q=>q.unit===au)&&(
          <div style={{background:"rgba(255,255,255,.95)",borderRadius:16,padding:"13px"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              <span style={{fontSize:20}}>{um.emoji}</span>
              <div><p style={{fontWeight:900,fontSize:12,color:um.color,margin:0}}>{um.label}：{um.title}</p><p style={{color:"#6B7280",fontSize:10,fontWeight:700,margin:"1px 0 0"}}>全{gc(au)}問</p></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:10}}>
              {["Lv1","Lv2","Lv3"].map(level=>{const lm=LM[level],cnt=bank.filter(q=>q.unit===au&&q.level===level).length,locked=cnt===0;return(
                <button key={level} disabled={locked} onClick={()=>start(au,level)}
                  style={{background:locked?"#F9FAFB":lm.bg,border:`2.5px solid ${locked?"#E5E7EB":lm.color}`,borderRadius:12,padding:"8px 4px",cursor:locked?"not-allowed":"pointer",textAlign:"center",opacity:locked?0.4:1,fontFamily:F}}>
                  <div style={{fontFamily:"'Nunito',sans-serif",fontWeight:900,fontSize:14,color:locked?"#9CA3AF":lm.color}}>{lm.label}</div>
                  <div style={{fontSize:8,color:locked?"#9CA3AF":"#374151",fontWeight:700,margin:"2px 0",lineHeight:1.3}}>{um.levelDesc[level]}</div>
                  <div style={{background:locked?"#E5E7EB":lm.color,color:"#fff",fontWeight:900,fontSize:9,borderRadius:99,padding:"2px 6px",display:"inline-block"}}>{locked?"準備中":`${cnt}問`}</div>
                </button>
              );})}
            </div>
            <button onClick={()=>start(au,null)} style={{width:"100%",background:"linear-gradient(90deg,#059669,#10B981)",color:"#fff",fontWeight:900,fontSize:12,padding:"10px 0",borderRadius:12,border:"none",cursor:"pointer",fontFamily:F}}>{um.emoji} {um.label}の全{gc(au)}問に挑戦！</button>
          </div>
        )}
        <button onClick={()=>start(null,null)} style={{width:"100%",marginTop:8,background:"rgba(255,255,255,.15)",color:"#fff",fontWeight:900,fontSize:12,padding:"10px 0",borderRadius:12,border:"2px solid rgba(255,255,255,.32)",cursor:"pointer",fontFamily:F}}>🚀 全{bank.length}問まとめて挑戦！</button>
      </div>
    </div>
  );

  if(sub==="complete"){
    const pct=score.t?Math.round(score.c/score.t*100):0;
    return(
      <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#064E3B,#059669,#10B981)",fontFamily:F,padding:"20px 16px 40px",overflowY:"auto"}}>
        <Fireworks show={pct===100}/>
        <div className="pop" style={{maxWidth:440,margin:"0 auto",textAlign:"center"}}>
          <div style={{fontSize:66}}>{pct===100?"🏆":pct>=60?"💪":"📖"}</div>
          <h2 style={{fontFamily:"'Nunito',sans-serif",fontWeight:900,fontSize:30,color:"#fff",margin:"0 0 3px"}}>{pct===100?"パーフェクト！":"おわり！"}</h2>
          <div style={{background:"#fff",borderRadius:18,padding:"20px",marginBottom:12}}>
            <div style={{fontSize:54,fontWeight:900,color:pct>=60?"#059669":"#DC2626",fontFamily:"'Nunito',sans-serif",lineHeight:1}}>{pct}<span style={{fontSize:26}}>%</span></div>
            <p style={{color:"#374151",fontWeight:700,fontSize:14,margin:"4px 0 12px"}}>{score.c} / {score.t} 問正解</p>
            <div style={{height:12,background:"#E5E7EB",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:pct>=60?"#059669":"#DC2626",borderRadius:99,transition:"width 1s"}}/></div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>start(su,sl)} style={{flex:1,background:"#FFD600",color:"#1A1A2E",fontWeight:900,fontSize:13,padding:"13px 0",borderRadius:14,border:"none",cursor:"pointer",fontFamily:F}}>🔄 もう一度</button>
            <button onClick={()=>setSub("home")} style={{flex:1,background:"rgba(255,255,255,.2)",color:"#fff",fontWeight:900,fontSize:13,padding:"13px 0",borderRadius:14,border:"2px solid rgba(255,255,255,.4)",cursor:"pointer",fontFamily:F}}>📚 単元選択</button>
          </div>
          <button onClick={back} style={{width:"100%",marginTop:8,background:"rgba(255,255,255,.1)",color:"rgba(255,255,255,.6)",fontWeight:900,fontSize:12,padding:"10px 0",borderRadius:12,border:"1px solid rgba(255,255,255,.18)",cursor:"pointer",fontFamily:F}}>🏠 メニューへ</button>
        </div>
      </div>
    );
  }

  if(!q)return null;
  const lm=LM[q.level]||{},um2=UM[q.unit]||{},prog=queue.length?(idx/queue.length)*100:0;
  const correct=q.answer.filter(w=>w!==",");
  const correctStr=correct.join(" ");

  return(
    <div style={{minHeight:"100vh",background:"#F0FDF4",fontFamily:F,paddingBottom:40}}>
      <div style={{background:"linear-gradient(90deg,#059669,#10B981)",padding:"10px 13px 0"}}>
        <div style={{maxWidth:500,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <button onClick={handleBack} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",fontWeight:900,fontSize:10,padding:"4px 8px",borderRadius:99,cursor:"pointer",fontFamily:F}}>← 単元選択</button>
              <button onClick={handleBackToMenu} style={{background:"rgba(255,255,255,.12)",border:"1px solid rgba(255,255,255,.3)",color:"rgba(255,255,255,.8)",fontWeight:900,fontSize:10,padding:"4px 8px",borderRadius:99,cursor:"pointer",fontFamily:F}}>🏠</button>
              {su&&<span style={{background:"rgba(255,255,255,.22)",color:"#fff",fontWeight:900,fontSize:9,padding:"2px 7px",borderRadius:99}}>{um2.label}</span>}
              {sl&&<span style={{background:lm.bg,color:lm.color,fontWeight:900,fontSize:9,padding:"2px 7px",borderRadius:99}}>{lm.label}</span>}
              {combo>=3&&<span className="comboAnim" style={{background:combo>=6?"linear-gradient(90deg,#FF6B35,#FFD600)":"#FF6B35",color:"#fff",fontWeight:900,fontSize:9,padding:"2px 7px",borderRadius:99}}>🔥{combo}連続！</span>}
            </div>
            <span style={{color:"rgba(255,255,255,.8)",fontWeight:900,fontSize:12,fontFamily:"'Nunito',sans-serif"}}><span style={{color:"#fff"}}>{idx+1}</span>/{queue.length}</span>
          </div>
          <div style={{height:8,background:"rgba(255,255,255,.25)",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${prog}%`,background:"#FFD600",borderRadius:99,transition:"width .5s"}}/></div>
        </div>
      </div>

      <div style={{maxWidth:500,margin:"0 auto",padding:"12px 13px 0"}}>
        {combo>=3&&phase==="question"&&<ComboDisplay combo={combo}/>}

        <div key={q.id} className={shaking?"shake":"pop"} style={{background:"#fff",border:"3px solid #059669",borderRadius:18,padding:"14px 16px",marginBottom:12}}>
          <div style={{display:"flex",gap:6,marginBottom:8}}>
            <span style={{background:"#059669",color:"#fff",fontSize:9,fontWeight:900,padding:"3px 9px",borderRadius:99}}>{q.topic}</span>
            <span style={{background:lm.bg||"#D1FAE5",color:lm.color||"#059669",fontSize:9,fontWeight:900,padding:"3px 7px",borderRadius:99}}>{lm.label}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:34,flexShrink:0}}>{q.emoji}</span>
            <div><p style={{color:"#6B7280",fontSize:10,fontWeight:700,margin:"0 0 2px"}}>次の日本語を英語に直しましょう</p><p style={{color:"#1F2937",fontWeight:900,fontSize:17,margin:0,lineHeight:1.4}}>{q.japanese}</p></div>
          </div>
        </div>

        <div style={{background:"#fff",border:"2.5px solid #D1D5DB",borderRadius:15,padding:"12px",marginBottom:10}}>
          <p style={{color:"#6B7280",fontSize:10,fontWeight:700,margin:"0 0 6px"}}>✏️ 並べた文（タップで戻す）</p>
          <div style={{minHeight:48,background:"#F9FAFB",borderRadius:10,padding:"6px",display:"flex",flexWrap:"wrap",gap:5,marginBottom:10,border:"2px dashed #D1D5DB",alignItems:"center"}}>
            {arr.length===0?<p style={{color:"#9CA3AF",fontSize:11,fontWeight:700,margin:"auto 0"}}>ここに単語が並びます…</p>:
              arr.map(item=><button key={item.id} onClick={()=>{if(phase==="question")tapArr(item);}} style={{background:"#059669",color:"#fff",fontWeight:900,fontSize:13,padding:"5px 11px",borderRadius:8,border:"none",cursor:phase==="question"?"pointer":"default",fontFamily:"'Nunito',sans-serif",boxShadow:"0 2px 6px rgba(5,150,105,.35)"}}>{item.w}</button>)
            }
          </div>
          <p style={{color:"#6B7280",fontSize:10,fontWeight:700,margin:"0 0 6px"}}>📦 選択肢（タップして追加）</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
            {avail.map(item=><button key={item.id} onClick={()=>{if(phase==="question")tapAv(item);}} style={{background:"#F3F4F6",color:"#374151",fontWeight:900,fontSize:13,padding:"5px 11px",borderRadius:8,border:"2.5px solid #D1D5DB",cursor:phase==="question"?"pointer":"default",fontFamily:"'Nunito',sans-serif"}}>{item.w}</button>)}
          </div>
        </div>

        {phase==="result"&&(
          <div className="fadeUp" style={{display:"flex",flexDirection:"column",gap:9}}>
            <div style={{background:result==="correct"?"#D1FAE5":"#FEE2E2",border:`3px solid ${result==="correct"?"#059669":"#DC2626"}`,borderRadius:15,padding:"12px 14px"}}>
              <p style={{fontWeight:900,fontSize:17,textAlign:"center",color:result==="correct"?"#065F46":"#991B1B",margin:"0 0 6px"}}>{result==="correct"?"🎉 "+(combo>=3?"コンボ継続！":"正解！"):"😅 不正解…"}</p>
              {result==="wrong"&&(
                <>
                  <p style={{color:"#991B1B",fontSize:10,fontWeight:700,margin:"0 0 4px"}}>正しい順番：</p>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>
                    {correct.map((w,i)=><span key={i} style={{background:"#059669",color:"#fff",fontWeight:900,fontSize:13,padding:"4px 9px",borderRadius:6,fontFamily:"'Nunito',sans-serif"}}>{w}</span>)}
                  </div>
                </>
              )}
              <div style={{background:"rgba(255,255,255,.6)",borderRadius:10,padding:"9px"}}>
                <p style={{color:"#065F46",fontWeight:900,fontSize:10,margin:"0 0 5px"}}>🔊 正解の文を音声で確認しよう</p>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                  <span style={{color:"#1F2937",fontWeight:900,fontSize:15,fontFamily:"'Nunito',sans-serif",flex:1}}>{correctStr}</span>
                </div>
                <SpeakButton text={correctStr} label="🔊 正解の文を聴く" color="#059669" size="large"/>
              </div>
            </div>

            <button onClick={()=>setShowExpl(v=>!v)} style={{background:"#EDE9FE",color:"#6D28D9",fontWeight:900,fontSize:11,padding:"11px 0",borderRadius:12,border:"2px solid #C4B5FD",cursor:"pointer",fontFamily:F}}>
              {showExpl?"▲ 文法解説を閉じる":"📖 文法解説を見る（なぜこの語順？）"}
            </button>
            <AiChatButton question={expl?.japanese || "並べ替え問題"} answer={correctStr} />

            {showExpl&&expl&&(
              <div className="fadeUp" style={{background:"#fff",border:"2.5px solid #C4B5FD",borderRadius:14,padding:"13px 14px",display:"flex",flexDirection:"column",gap:10}}>
                <div style={{background:"#EDE9FE",borderRadius:10,padding:"10px 12px"}}>
                  <p style={{color:"#4C1D95",fontWeight:900,fontSize:11,margin:"0 0 4px"}}>📌 文法ルール</p>
                  <p style={{color:"#5B21B6",fontWeight:700,fontSize:11,lineHeight:1.8,margin:0}}>{expl.rule||"この文の語順を確認しましょう。"}</p>
                </div>
                <div style={{background:"#F0FDF4",borderRadius:10,padding:"10px 12px"}}>
                  <p style={{color:"#065F46",fontWeight:900,fontSize:11,margin:"0 0 6px"}}>✅ 各単語の役割</p>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:7}}>
                    {correct.map((w,i)=><span key={i} style={{background:"#059669",color:"#fff",fontWeight:900,fontSize:14,padding:"5px 10px",borderRadius:7,fontFamily:"'Nunito',sans-serif"}}>{w}</span>)}
                  </div>
                  <p style={{color:"#374151",fontWeight:700,fontSize:10,lineHeight:2,margin:0}}>{expl.breakdown}</p>
                </div>
                <div style={{background:"#FFF7ED",borderRadius:10,padding:"9px 12px"}}>
                  <p style={{color:"#92400E",fontWeight:900,fontSize:10,margin:"0 0 3px"}}>🇯🇵 日本語訳</p>
                  <p style={{color:"#1F2937",fontWeight:700,fontSize:12,margin:0}}>{expl.japanese}</p>
                </div>
                <SpeakButton text={correctStr} label="🔊 もう一度音声で確認" color="#6D28D9"/>
              </div>
            )}
          </div>
        )}

        {phase==="question"&&<button onClick={check} disabled={arr.length===0} style={{width:"100%",background:arr.length>0?"#FFD600":"#E5E7EB",color:arr.length>0?"#1A1A2E":"#9CA3AF",fontWeight:900,fontSize:14,padding:"13px 0",borderRadius:16,border:"none",cursor:arr.length>0?"pointer":"not-allowed",fontFamily:F}}>✅ 答えを確認する</button>}
        {phase==="result"&&<button onClick={next} style={{width:"100%",background:"#FFD600",color:"#1A1A2E",fontWeight:900,fontSize:15,padding:"14px 0",borderRadius:16,border:"none",cursor:"pointer",fontFamily:F,boxShadow:"0 5px 18px rgba(255,214,0,.45)"}}>{idx+1>=queue.length?"🏁 結果を見る！":"次の問題へ →"}</button>}
      </div>
    </div>
  );
}

/* ═══════════════ WORD QUIZ ═══════════════ */
function WordQuiz({bank,wp,saveWP,srsData,saveSRS,addHist,addXP,back}){
  const [sub,setSub]=useState("level");
  const [sl,setSl]=useState(1);
  const [sm,setSm]=useState(null);
  const [queue,setQueue]=useState([]);
  const [idx,setIdx]=useState(0);
  const [phase,setPhase]=useState("question");
  const [chosen,setChosen]=useState(null);
  const [choices,setChoices]=useState([]);
  const [inp,setInp]=useState("");
  const [result,setResult]=useState(null);
  const [score,setScore]=useState({c:0,t:0});
  const [shaking,setShaking]=useState(false);
  const [startTime,setStartTime]=useState(0);
  const [combo,setCombo]=useState(0);

  const levels=[...new Set(bank.map(w=>w.level))].sort((a,b)=>a-b);

  const bldC=(q,mode)=>{
    if(mode==="en2ja"||mode==="phrase"){const p=bank.filter(w=>w.japanese!==q.japanese).map(w=>w.japanese);return shuf([q.japanese,...shuf(p).slice(0,3)]);}
    const p=bank.filter(w=>w.english!==q.english).map(w=>w.english);return shuf([q.english,...shuf(p).slice(0,3)]);
  };

  const handleBackToMode = useCallback(() => { setSub("mode"); },[]);
  const handleBackToMenu = useCallback(() => { back(); },[back]);

  const start=useCallback((level,mode)=>{
    let pool=bank.filter(w=>w.level===level);
    pool=srsSortPool(pool,srsData);
    setQueue(pool);setSl(level);setSm(mode);
    setIdx(0);setScore({c:0,t:0});setPhase("question");setChosen(null);setInp("");setResult(null);setCombo(0);
    if(mode!=="spell"&&mode!=="phrase"&&pool[0])setChoices(bldC(pool[0],mode));
    setSub("quiz");setStartTime(Date.now());
  },[bank,srsData]);

  useEffect(()=>{
    if(queue[idx]&&sm&&sm!=="spell"&&sm!=="phrase")setChoices(bldC(queue[idx],sm));
    setChosen(null);setInp("");setResult(null);setPhase("question");setStartTime(Date.now());
  },[idx,queue]);

  const q=queue[idx];

  const PRAISE=["すごい！🌟","やったね！🎊","かんぺき！✨","さすが！🏆","大正解！🎯","ばっちり！💫","よくできました！⭐","天才！🧠"];
  const RETRY=["もう一回チャレンジ！💪","ドンマイ！次は正解できるよ！😊","惜しい！もう一度！🔥","練習あるのみ！📚","次はきっと正解！⭐"];
  const [praiseIdx]=useState(()=>Math.floor(Math.random()*PRAISE.length));
  const [retryIdx]=useState(()=>Math.floor(Math.random()*RETRY.length));

  const doConfDirect=(answer)=>{
    if(!q)return;
    const timeMs=Date.now()-startTime;
    let ok=sm==="en2ja"?answer===q.japanese
          :sm==="ja2en"?answer===q.english
          :sm==="phrase"?answer===q.japanese:false;
    setChosen(answer);
    setResult(ok?"correct":"wrong");
    if(!ok){setShaking(true);setTimeout(()=>setShaking(false),600);}
    const newCombo=ok?combo+1:0;setCombo(newCombo);
    setScore(s=>{
      const ns={c:s.c+(ok?1:0),t:s.t+1};
      addHist({mode:"word",label:`Lv${sl} ${WM.find(m=>m.key===sm)?.label||""}`,correct:ok?1:0,total:1});
      return ns;
    });
    const grade=srsGrade(ok,timeMs);
    const rec=srsData[q.id]||srsDefault();
    saveSRS({...srsData,[q.id]:srsUpdate(rec,grade)});
    if(ok)addXP(XP_PER_CORRECT+(newCombo>=3?XP_BONUS_STREAK:0),null);
    setPhase("result");
  };

  const doConfSpell=()=>{
    if(!q)return;
    const timeMs=Date.now()-startTime;
    const ok=inp.trim().toLowerCase()===q.english.toLowerCase();
    setResult(ok?"correct":"wrong");
    if(!ok){setShaking(true);setTimeout(()=>setShaking(false),600);}
    const newCombo=ok?combo+1:0;setCombo(newCombo);
    setScore(s=>{
      const ns={c:s.c+(ok?1:0),t:s.t+1};
      addHist({mode:"word",label:`Lv${sl} ${WM.find(m=>m.key===sm)?.label||""}`,correct:ok?1:0,total:1});
      return ns;
    });
    const grade=srsGrade(ok,timeMs);
    const rec=srsData[q.id]||srsDefault();
    saveSRS({...srsData,[q.id]:srsUpdate(rec,grade)});
    if(ok)addXP(XP_PER_CORRECT+(newCombo>=3?XP_BONUS_STREAK:0),null);
    setPhase("result");
  };

  const doNext=()=>{
    if(idx+1>=queue.length){
      const pct=score.t?Math.round(score.c/score.t*100):0;
      saveWP({...wp,[String(sl)]:{pct,sess:(wp[String(sl)]?.sess||0)+1}});
      setSub("complete");
    }else setIdx(i=>i+1);
  };

  if(sub==="level") return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#7F1D1D,#DC2626,#F59E0B)",fontFamily:F,padding:"16px 16px 36px",overflowY:"auto"}}>
      <div style={{maxWidth:480,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:13}}>
          <button onClick={back} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",fontWeight:900,fontSize:12,padding:"6px 12px",borderRadius:99,cursor:"pointer",fontFamily:F}}>← メニュー</button>
          <h2 style={{color:"#fff",fontWeight:900,fontSize:16,margin:0}}>📖 単語問題</h2>
        </div>
        <div style={{background:"rgba(255,255,255,.12)",borderRadius:11,padding:"8px 12px",marginBottom:12}}>
          <p style={{color:"#fff",fontWeight:700,fontSize:11,margin:0,lineHeight:1.7}}>📚 Lv1〜20で中学英単語をマスター！<br/>💬 フレーズモードでチャンクごと覚えよう！</p>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6}}>
          {levels.map(lv=>{
            const p=wp[String(lv)];const col=p?.pct>=80?"#10B981":p?.pct>=60?"#F59E0B":"rgba(255,255,255,.3)";
            return(
              <button key={lv} onClick={()=>{setSl(lv);setSub("mode");}} style={{background:"rgba(255,255,255,.1)",border:`2px solid ${p?col:"rgba(255,255,255,.18)"}`,borderRadius:12,padding:"10px 4px",cursor:"pointer",textAlign:"center",fontFamily:F,position:"relative"}}>
                <div style={{fontFamily:"'Nunito',sans-serif",fontWeight:900,fontSize:17,color:"#fff"}}>Lv{lv}</div>
                <div style={{color:"rgba(255,255,255,.55)",fontSize:9,fontWeight:700}}>{bank.filter(w=>w.level===lv).length}語</div>
                {p&&<div style={{color:col,fontSize:9,fontWeight:900,marginTop:1}}>{p.pct}%</div>}
                {p?.pct>=80&&<div style={{position:"absolute",top:-3,right:-3,fontSize:12}}>🌟</div>}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );

  if(sub==="mode") return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#7F1D1D,#DC2626,#F59E0B)",fontFamily:F,padding:"16px 16px 36px",overflowY:"auto"}}>
      <div style={{maxWidth:480,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
          <button onClick={()=>setSub("level")} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",fontWeight:900,fontSize:12,padding:"6px 12px",borderRadius:99,cursor:"pointer",fontFamily:F}}>← 戻る</button>
          <h2 style={{color:"#fff",fontWeight:900,fontSize:16,margin:0}}>📖 Lv{sl} — モード選択</h2>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {WM.map(m=>(
            <button key={m.key} onClick={()=>start(sl,m.key)} style={{background:"rgba(255,255,255,.1)",border:"2px solid rgba(255,255,255,.18)",borderRadius:16,padding:"14px 15px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,fontFamily:F,width:"100%",textAlign:"left"}}>
              <div style={{width:44,height:44,borderRadius:12,background:`linear-gradient(135deg,${m.color},${m.color}aa)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{m.emoji}</div>
              <div style={{flex:1}}><p style={{color:"#fff",fontWeight:900,fontSize:14,margin:"0 0 2px",fontFamily:"'Nunito',sans-serif"}}>{m.label}</p><p style={{color:"rgba(255,255,255,.5)",fontSize:10,fontWeight:700,margin:0}}>{m.desc}</p></div>
              <span style={{color:"rgba(255,255,255,.45)",fontSize:18}}>›</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );

  if(sub==="complete"){
    const pct=score.t?Math.round(score.c/score.t*100):0;
    return(
      <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#7F1D1D,#DC2626,#F59E0B)",fontFamily:F,padding:"20px 16px 40px",overflowY:"auto"}}>
        <Fireworks show={pct===100}/>
        <div className="pop" style={{maxWidth:440,margin:"0 auto",textAlign:"center"}}>
          <div style={{fontSize:66}}>{pct===100?"🏆":pct>=60?"💪":"📖"}</div>
          <h2 style={{fontFamily:"'Nunito',sans-serif",fontWeight:900,fontSize:30,color:"#fff",margin:"0 0 3px"}}>{pct===100?"パーフェクト！":"おわり！"}</h2>
          <div style={{background:"#fff",borderRadius:18,padding:"20px",marginBottom:12}}>
            <div style={{fontSize:54,fontWeight:900,color:pct>=60?"#059669":"#DC2626",fontFamily:"'Nunito',sans-serif",lineHeight:1}}>{pct}<span style={{fontSize:26}}>%</span></div>
            <p style={{color:"#374151",fontWeight:700,fontSize:14,margin:"4px 0 12px"}}>{score.c} / {score.t} 問正解</p>
            <div style={{height:12,background:"#E5E7EB",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:pct>=60?"#059669":"#DC2626",borderRadius:99,transition:"width 1s"}}/></div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>start(sl,sm)} style={{flex:1,background:"#FFD600",color:"#1A1A2E",fontWeight:900,fontSize:13,padding:"12px 0",borderRadius:13,border:"none",cursor:"pointer",fontFamily:F}}>🔄 もう一度</button>
            <button onClick={()=>setSub("mode")} style={{flex:1,background:"rgba(255,255,255,.2)",color:"#fff",fontWeight:900,fontSize:13,padding:"12px 0",borderRadius:13,border:"2px solid rgba(255,255,255,.4)",cursor:"pointer",fontFamily:F}}>📋 モード変更</button>
          </div>
          <button onClick={()=>setSub("level")} style={{width:"100%",marginTop:7,background:"rgba(255,255,255,.1)",color:"rgba(255,255,255,.65)",fontWeight:900,fontSize:12,padding:"10px 0",borderRadius:12,border:"1px solid rgba(255,255,255,.18)",cursor:"pointer",fontFamily:F}}>📚 レベル選択</button>
          <button onClick={back} style={{width:"100%",marginTop:6,background:"rgba(255,255,255,.06)",color:"rgba(255,255,255,.45)",fontWeight:900,fontSize:12,padding:"10px 0",borderRadius:12,border:"1px solid rgba(255,255,255,.1)",cursor:"pointer",fontFamily:F}}>🏠 メニューへ</button>
        </div>
      </div>
    );
  }

  if(!q)return null;
  const mi=WM.find(m=>m.key===sm)||WM[0];
  const prog=queue.length?(idx/queue.length)*100:0;
  const isSpell=sm==="spell",isPhrase=sm==="phrase",isEn=sm==="en2ja";
  const qWord=isEn||isPhrase?q.english:q.japanese;
  const showSpeakOnQuestion = isEn || isPhrase;

  return(
    <div style={{minHeight:"100vh",background:"#FFF7ED",fontFamily:F,paddingBottom:44}}>
      <div style={{background:"linear-gradient(90deg,#DC2626,#F59E0B)",padding:"10px 13px 0"}}>
        <div style={{maxWidth:500,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <button onClick={handleBackToMode} style={{background:"rgba(255,255,255,.2)",border:"none",color:"#fff",fontWeight:900,fontSize:10,padding:"4px 8px",borderRadius:99,cursor:"pointer",fontFamily:F}}>← モード選択</button>
              <button onClick={handleBackToMenu} style={{background:"rgba(255,255,255,.12)",border:"1px solid rgba(255,255,255,.3)",color:"rgba(255,255,255,.8)",fontWeight:900,fontSize:10,padding:"4px 8px",borderRadius:99,cursor:"pointer",fontFamily:F}}>🏠</button>
              <span style={{background:"rgba(255,255,255,.22)",color:"#fff",fontWeight:900,fontSize:9,padding:"2px 7px",borderRadius:99}}>Lv{sl}</span>
              <span style={{background:"rgba(255,255,255,.18)",color:"#fff",fontWeight:700,fontSize:9,padding:"2px 7px",borderRadius:99}}>{mi.label}</span>
              {combo>=3&&<span className="comboAnim" style={{background:combo>=6?"linear-gradient(90deg,#FF6B35,#FFD600)":"#FF6B35",color:"#fff",fontWeight:900,fontSize:9,padding:"2px 7px",borderRadius:99}}>🔥{combo}連続！</span>}
            </div>
            <span style={{color:"rgba(255,255,255,.8)",fontWeight:900,fontSize:12,fontFamily:"'Nunito',sans-serif"}}><span style={{color:"#fff"}}>{idx+1}</span>/{queue.length}</span>
          </div>
          <div style={{height:8,background:"rgba(255,255,255,.25)",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${prog}%`,background:"#FFD600",borderRadius:99,transition:"width .5s"}}/></div>
        </div>
      </div>

      <div style={{maxWidth:500,margin:"0 auto",padding:"12px 13px 0"}}>
        {combo>=3&&phase==="question"&&<ComboDisplay combo={combo}/>}

        <div key={q.id} className={shaking?"shake":"pop"} style={{background:"#fff",border:"3px solid #DC2626",borderRadius:18,padding:"18px",marginBottom:13}}>
          <div style={{display:"flex",justifyContent:"center",marginBottom:10}}>
            <span style={{background:`linear-gradient(135deg,${mi.color},${mi.color}bb)`,color:"#fff",fontSize:9,fontWeight:900,padding:"3px 10px",borderRadius:99}}>{mi.emoji} {mi.label}</span>
          </div>
          <p style={{color:"#6B7280",fontSize:10,fontWeight:700,margin:"0 0 6px",textAlign:"center"}}>
            {isSpell?"この日本語の英単語を入力してください":isEn?"この英単語の日本語の意味を選んでください":isPhrase?"このフレーズの意味を選んでください":"この日本語に対応する英単語を選んでください"}
          </p>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
            <p style={{color:"#1F2937",fontWeight:900,fontSize:isPhrase?19:26,margin:0,fontFamily:"'Nunito',sans-serif",lineHeight:1.3,textAlign:"center"}}>{qWord}</p>
            {showSpeakOnQuestion && phase==="question" && (
              <SpeakIcon text={q.english} size={46}/>
            )}
          </div>
          {isPhrase&&q.phrase&&<p style={{color:"#9CA3AF",fontSize:10,fontWeight:700,margin:"6px 0 0",textAlign:"center"}}>💬 フレーズ：{q.phrase}</p>}
          {!isEn&&!isPhrase&&<p style={{color:"#9CA3AF",fontSize:10,fontWeight:700,margin:"4px 0 0",textAlign:"center"}}>品詞：{q.type}</p>}
          {isSpell&&<p style={{color:"#9CA3AF",fontSize:10,fontWeight:700,margin:"6px 0 0",textAlign:"center"}}>ヒント：最初の文字「{q.english[0]}」　{q.english.length}文字</p>}
          {!showSpeakOnQuestion && phase==="question" && (
            <div style={{marginTop:10,display:"flex",justifyContent:"center"}}>
              <button onClick={()=>speak(q.english,0.82)}
                style={{background:"rgba(220,38,38,.08)",border:"1.5px solid rgba(220,38,38,.25)",color:"#DC2626",fontWeight:700,fontSize:10,padding:"5px 14px",borderRadius:99,cursor:"pointer",fontFamily:F,display:"flex",alignItems:"center",gap:5}}>
                <span style={{fontSize:13}}>🔊</span> 英語の発音を聴く（ヒント）
              </button>
            </div>
          )}
        </div>

        {!isSpell&&phase==="question"&&(
          <div style={{display:"flex",flexDirection:"column",gap:9}}>
            {choices.map((c,i)=>(
              <button key={i} className="fadeUp" style={{animationDelay:`${i*45}ms`,display:"flex",alignItems:"center",gap:12,background:"#fff",border:`3px solid ${OC[i]}`,borderRadius:15,padding:"13px 15px",cursor:"pointer",fontFamily:F,width:"100%",boxShadow:`0 3px 10px ${OC[i]}22`}}
                onClick={()=>{if(phase==="question")doConfDirect(c);}}>
                <span style={{background:OC[i],color:"#fff",fontWeight:900,fontSize:13,width:32,height:32,borderRadius:99,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontFamily:"'Nunito',sans-serif"}}>{OL[i]}</span>
                <span style={{color:"#111827",fontWeight:900,fontSize:16,fontFamily:"'Nunito',sans-serif"}}>{c}</span>
              </button>
            ))}
          </div>
        )}

        {isSpell&&phase==="question"&&(
          <div className="fadeUp" style={{display:"flex",flexDirection:"column",gap:10}}>
            <div style={{background:"#fff",border:"2.5px solid #D1D5DB",borderRadius:15,padding:"13px"}}>
              <p style={{color:"#6B7280",fontSize:10,fontWeight:700,margin:"0 0 8px"}}>英単語を入力してください（大文字・小文字どちらでも可）</p>
              <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&inp.trim())doConfSpell();}} placeholder="英単語を入力…"
                style={{width:"100%",background:"#F9FAFB",border:"2.5px solid #E5E7EB",borderRadius:10,padding:"11px 13px",fontSize:18,fontWeight:700,fontFamily:"'Nunito',sans-serif",color:"#1F2937",letterSpacing:1}}
                autoFocus/>
            </div>
            <button onClick={doConfSpell} disabled={!inp.trim()} style={{background:inp.trim()?"#DC2626":"#E5E7EB",color:inp.trim()?"#fff":"#9CA3AF",fontWeight:900,fontSize:14,padding:"13px 0",borderRadius:15,border:"none",cursor:inp.trim()?"pointer":"not-allowed",fontFamily:F}}>✅ 答える</button>
          </div>
        )}

        {phase==="result"&&(
          <div className="fadeUp" style={{display:"flex",flexDirection:"column",gap:10}}>
            <div style={{background:result==="correct"?"#D1FAE5":"#FEE2E2",border:`3px solid ${result==="correct"?"#059669":"#DC2626"}`,borderRadius:18,padding:"16px"}}>
              <div style={{textAlign:"center",marginBottom:10}}>
                <div style={{fontSize:50}}>{result==="correct"?"🎉":"😅"}</div>
                <p style={{color:result==="correct"?"#065F46":"#991B1B",fontWeight:900,fontSize:20,margin:"4px 0 0",fontFamily:"'Nunito',sans-serif"}}>
                  {result==="correct"?PRAISE[praiseIdx]:RETRY[retryIdx]}
                </p>
                {result==="wrong"&&<p style={{color:"#991B1B",fontSize:12,fontWeight:700,margin:"4px 0 0"}}>正解は「{sm==="en2ja"||sm==="phrase"?q.japanese:q.english}」でした</p>}
              </div>
              <div style={{background:"rgba(255,255,255,.7)",borderRadius:12,padding:"13px 15px"}}>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:4}}>
                      <p style={{color:"#1F2937",fontWeight:900,fontSize:24,margin:0,fontFamily:"'Nunito',sans-serif"}}>{q.english}</p>
                      <SpeakIcon text={q.english} size={46}/>
                    </div>
                    <p style={{color:"#374151",fontWeight:700,fontSize:14,margin:0}}>{q.japanese}</p>
                    {q.phrase&&<p style={{color:"#6B7280",fontSize:10,fontWeight:700,margin:"5px 0 0",lineHeight:1.6}}>💬 {q.phrase}</p>}
                  </div>
                </div>
                <SpeakButton text={q.english} label="🔊 発音を聴く" color="#DC2626" size="large"/>
              </div>
            </div>
            <button onClick={doNext} style={{background:"#FFD600",color:"#1A1A2E",fontWeight:900,fontSize:15,padding:"14px 0",borderRadius:16,border:"none",cursor:"pointer",fontFamily:F,boxShadow:"0 5px 18px rgba(255,214,0,.45)"}}>{idx+1>=queue.length?"🏁 結果を見る！":"次の問題へ →"}</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════ BOOTSTRAP ═══════════════ */
Promise.all([
  fetch("questions.json").then(r=>r.json()).catch(()=>[]),
  fetch("sort_questions.json").then(r=>r.json()).catch(()=>[]),
  fetch("words.json").then(r=>r.json()).catch(()=>[]),
]).then(([fb,sb,wb])=>{
  const wbWithId=wb.map((w,i)=>({...w,id:w.id||`word_${i}`,phrase:w.phrase||null}));
  ReactDOM.createRoot(document.getElementById("root")).render(
    <App fillBank={fb} sortBank={sb} wordBank={wbWithId}/>
  );
}).catch(err=>{
  document.getElementById("root").innerHTML=`
    <div style="color:#1A1A2E;padding:24px;font-family:sans-serif;max-width:500px;margin:40px auto;background:#fff;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,.12);">
      <h2 style="color:#DC2626;">⚠️ 読み込みエラー</h2>
      <p>以下のファイルを<strong>index.html</strong>と同じフォルダに置いてください：</p>
      <ul style="line-height:2.2;">
        <li>questions.json（穴埋め問題）</li>
        <li>sort_questions.json（並べ替え問題）</li>
        <li>words.json（単語問題）</li>
      </ul>
      <pre style="background:#FEE2E2;padding:12px;border-radius:8px;font-size:11px;overflow:auto;">${err}</pre>
    </div>`;
});
</script>
</body>
</html>
